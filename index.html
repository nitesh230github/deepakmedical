<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">

    <title>Deepak Medical Agency</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<header>

    <!-- Top Header -->

    <div class="top-header">

        <div class="logo-section">

            <img src="images/logo.png"
            class="logo">

            <div>

                <h1>Deepak Medical Agency</h1>

                <p class="tagline">
                    सही दवाई, सही दाम, सुपरफ़ास्ट सर्विस
                </p>

            </div>

        </div>

    </div>

    <!-- Search Section -->

    <div class="search-section">

        <input
        type="text"
        id="search"
        class="search-box"
        placeholder="🔍 Search Medicines...">

        <select
        id="categoryFilter"
        class="category-box">

            <option value="ALL">
                📦 All Categories
            </option>

            <option value="TABLET_CAP">
                💊 Tablet / Cap
            </option>

            <option value="DROP">
                💧 Drop
            </option>

            <option value="SYRUP">
                🍯 Syrup
            </option>

            <option value="CREAM">
                🧴 Cream
            </option>

            <option value="OINTMENT">
                🩹 Ointment
            </option>

            <option value="OTHERS">
                📦 Others
            </option>

        </select>

        <div id="cartButton">

            🛒 Cart (0)

        </div>

    </div>

</header>

<div class="slider">

    <div class="slides">

        <img src="images/website_images/slider1.jpg">

        <img src="images/website_images/slider2.jpg">

        <img src="images/website_images/slider3.jpg">

    </div>

</div>

<div id="products"></div>

<div id="cartArea"></div>

<script src="script.js"></script>

</body>
</html>
